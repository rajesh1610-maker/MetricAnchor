[pytest]
# Root-level pytest configuration for unit, integration, and eval tests.
# API-level tests live in apps/api/ and run separately (cd apps/api && pytest).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths =
    tests/unit
    tests/integration
    evals
# -q  = quiet, only print failures
# --tb=short  = compact tracebacks
addopts = -q --tb=short
