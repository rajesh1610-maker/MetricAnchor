name: Question
description: Ask about usage, architecture, or how to contribute
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        For usage questions, [GitHub Discussions](../../discussions) is often faster. But a GitHub issue is fine too — we'll convert it to a Discussion if needed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before filing
      options:
        - label: I checked the [docs/](../docs/) folder
          required: true
        - label: I checked the [local-development guide](../docs/local-development.md)
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Question category
      options:
        - Setup / installation
        - Semantic model format
        - Question pipeline behaviour
        - LLM configuration
        - Running tests / CI
        - Architecture / design decision
        - Contributing / development workflow
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be as specific as possible. Include version, config, and what you've already tried.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant semantic model YAML, environment variables, or commands you ran.
      render: yaml
