name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I upload a Parquet file, the schema profiler returns..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Upload `sample_data/retail_sales.csv` via the UI
        2. Click "Ask a question"
        3. Type "What was revenue last quarter?"
        4. See error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected to see a table with revenue by quarter..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, LLM provider, and how you ran MetricAnchor.
      placeholder: |
        - OS: macOS 15.3
        - Docker: 27.4.0
        - LLM provider: openai / gpt-4o
        - Started with: docker-compose up
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from `make logs` or `docker-compose logs api`.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest version from the `main` branch.
          required: true
