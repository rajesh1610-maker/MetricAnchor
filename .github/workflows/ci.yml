name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR so stale runs don't waste minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Python lint ──────────────────────────────────────────────────────────────

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff==0.8.6

      - name: Check (errors + imports)
        run: ruff check apps/api/ packages/ cli/

      - name: Format check
        run: ruff format --check apps/api/ packages/ cli/

# ── TypeScript type-check ─────────────────────────────────────────────────────

  typecheck-web:
    name: Type-check TypeScript (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: tsc --noEmit
        working-directory: apps/web
        run: npx tsc --noEmit

# ── TypeScript lint ───────────────────────────────────────────────────────────

  lint-web:
    name: Lint TypeScript (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: ESLint
        working-directory: apps/web
        run: npm run lint

# ── Python unit tests + eval suite ───────────────────────────────────────────
# No server needed. Uses stub LLM. Sample data generated in-job.

  test-unit:
    name: Unit tests + eval suite
    runs-on: ubuntu-latest
    needs: lint-python
    env:
      # Make packages/ and root-level tests importable.
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      DATA_DIR: "/tmp/metricanchor_test"
      LLM_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Generate sample data
        run: python3 sample_data/generate.py

      - name: Unit tests
        run: python3 -m pytest tests/unit/ -q --tb=short

      - name: Eval suite
        run: python3 -m pytest evals/test_evals.py -q --tb=short

# ── Python integration tests ──────────────────────────────────────────────────
# Uses real DuckDB + sample CSVs. No server or LLM required.

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint-python
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      DATA_DIR: "/tmp/metricanchor_test"
      LLM_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Generate sample data
        run: python3 sample_data/generate.py

      - name: Integration tests
        run: python3 -m pytest tests/integration/ -q --tb=short

# ── API-level tests (FastAPI routes) ─────────────────────────────────────────
# Hits the actual FastAPI app via httpx.ASGITransport — no running server needed.

  test-api:
    name: API tests (FastAPI)
    runs-on: ubuntu-latest
    needs: lint-python
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      DATA_DIR: "/tmp/metricanchor_test_api"
      LLM_API_KEY: ""
      LOG_LEVEL: "WARNING"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: API tests with coverage
        working-directory: apps/api
        run: |
          python3 -m pytest tests/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/api/coverage.xml
          fail_ci_if_error: false

# ── Next.js build ─────────────────────────────────────────────────────────────
# Build must pass after lint and type checks.

  build-web:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [lint-web, typecheck-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
