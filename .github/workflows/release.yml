name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag -a v1.0.0 -m "v1.0.0"
#   git push origin v1.0.0
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-release: v1.1.0-rc.1, v1.1.0-beta.2

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # ── Run full CI suite on the tagged commit ─────────────────────────────
      # Abort if tests fail — never release broken code.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r apps/api/requirements-dev.txt

      - name: Generate sample data
        run: python3 sample_data/generate.py

      - name: Run unit + eval tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          DATA_DIR: "/tmp/ma_release_test"
          LLM_API_KEY: ""
        run: |
          python3 -m pytest tests/unit/ evals/test_evals.py -q --tb=short

      # ── Extract changelog entry for this version ───────────────────────────
      - name: Extract changelog notes
        id: changelog
        run: |
          python3 - << 'PYEOF'
          import re, os, sys

          version = "${{ steps.version.outputs.version }}".lstrip("v")
          with open("CHANGELOG.md") as f:
              content = f.read()

          # Match the section from ## [version] to the next ## [ header.
          pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else f"Release {version}"

          # Write to GITHUB_OUTPUT (multiline safe approach).
          delim = "NOTES_EOF"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"notes<<{delim}\n{notes}\n{delim}\n")
          PYEOF

      # ── Create the GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          IS_PRERELEASE=false
          if [[ "$VERSION" == *"-rc"* ]] || [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-alpha"* ]]; then
            IS_PRERELEASE=true
          fi

          gh release create "$VERSION" \
            --title "MetricAnchor $VERSION" \
            --notes "$NOTES" \
            $( [ "$IS_PRERELEASE" = "true" ] && echo "--prerelease" )
