name: retail_sales
dataset: retail_sales
description: >
  Retail order analytics covering revenue, cost, and margin across product
  categories, regions, and sales channels. One row per order line.
grain: one row per order line
time_column: order_date

metrics:
  - name: revenue
    description: Total gross revenue across all orders
    expression: SUM(revenue)
    aliases: [sales, total_revenue, gross_revenue, total_sales, income]
    format: currency

  - name: cost
    description: Total cost of goods sold
    expression: SUM(cost)
    aliases: [cogs, total_cost]
    format: currency

  - name: margin
    description: Total gross margin (revenue minus cost)
    expression: SUM(margin)
    aliases: [gross_margin, profit, total_margin, gross_profit]
    format: currency

  - name: margin_rate
    description: Gross margin as a percentage of revenue
    expression: SUM(margin) / NULLIF(SUM(revenue), 0) * 100
    aliases: [margin_pct, margin_percent, gross_margin_rate, margin_percentage, profitability]
    format: percent

  - name: units_sold
    description: Total units sold across all orders
    expression: SUM(units)
    aliases: [units, quantity, total_units, items_sold]

  - name: order_count
    description: Number of individual orders
    expression: COUNT(*)
    aliases: [orders, number_of_orders, total_orders, order_volume]

  - name: aov
    description: Average order value — revenue per order
    expression: SUM(revenue) / NULLIF(COUNT(*), 0)
    aliases: [average_order_value, avg_order_value, average_order, basket_size]
    format: currency

dimensions:
  - name: product
    column: product
    description: Product category
    aliases: [product_category, category, product_type, item]
    values: [Electronics, Apparel, Home, Sports, Beauty]

  - name: region
    column: region
    description: Sales region
    aliases: [geo, geography, area, location]
    values: [North, South, East, West]

  - name: channel
    column: channel
    description: Sales channel through which the order was placed
    aliases: [sales_channel, order_channel, medium]
    values: [Online, In-Store, Wholesale]

  - name: order_date
    column: order_date
    description: Date the order was placed
    aliases: [date, day, order_day, transaction_date]
    is_date: true

synonyms:
  - phrase: top selling
    maps_to: metric:revenue
  - phrase: best performing
    maps_to: metric:revenue
  - phrase: gross profit
    maps_to: metric:margin
  - phrase: profitability
    maps_to: metric:margin_rate
  - phrase: store
    maps_to: dimension:channel

caveats:
  - Revenue is gross revenue — returns and cancellations are NOT netted out in this dataset.
  - Margin is pre-calculated as revenue - cost at order time and does not reflect post-sale adjustments.
  - Online channel includes both web and mobile app orders.
