name: retail_sales
dataset: retail_sales
description: >
  Retail order analytics for a direct-to-consumer business.
  Covers revenue, order volume, average order value, and customer activity
  across product categories and regions.

time_column: order_date

metrics:
  - name: revenue
    description: Total value of completed orders (excludes cancelled and returned orders)
    expression: SUM(order_total)
    filters:
      - column: status
        operator: "="
        value: "completed"
    aliases:
      - sales
      - total revenue
      - net revenue

  - name: order_count
    description: Number of completed orders
    expression: COUNT(DISTINCT order_id)
    filters:
      - column: status
        operator: "="
        value: "completed"
    aliases:
      - orders
      - number of orders
      - completed orders

  - name: aov
    description: Average order value — revenue divided by number of completed orders
    expression: SUM(order_total) / NULLIF(COUNT(DISTINCT order_id), 0)
    filters:
      - column: status
        operator: "="
        value: "completed"
    aliases:
      - average order value
      - average basket size

  - name: units_sold
    description: Total quantity of items sold across completed orders
    expression: SUM(quantity)
    filters:
      - column: status
        operator: "="
        value: "completed"

dimensions:
  - name: product_category
    column: product_category
    description: High-level product grouping (Electronics, Apparel, Home, etc.)
    aliases:
      - category
      - product type

  - name: region
    column: region
    description: Geographic sales region
    aliases:
      - geography
      - area

  - name: status
    column: status
    description: Order status (completed, cancelled, returned, pending)

  - name: customer
    column: customer_id
    description: Unique customer identifier
